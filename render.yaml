databases:
  - name: codiss-db
    plan: free

services:
  - type: web
    name: codiss-cartographie
    runtime: python
    buildCommand: pip install -r requirements_render.txt
    startCommand: uvicorn main_local:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: codiss-db
          property: connectionString
