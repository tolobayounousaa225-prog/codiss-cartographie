# Ping toutes les 5 minutes → Render ne dort jamais → SQLite persiste
name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'   # Toutes les 5 minutes
  workflow_dispatch:          # Déclenchement manuel aussi

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Réveiller le service CODISS
        run: |
          echo "Ping $(date)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 \
            https://codiss-cartographie.onrender.com/health)
          echo "Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Service en ligne"
          else
            echo "⚠️ Service en démarrage (code: $STATUS) - normal si premier ping"
          fi
